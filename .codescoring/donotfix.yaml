# Files matching these patterns will not be modified by CodeScoring Quick Fix actions
# This is useful for generated files that should be regenerated instead of patched
#
# Pattern examples:
#   - go.sum                    # Exact filename
#   - "*.lock"                  # Files ending with .lock (* must be quoted)
#   - package-lock.json         # NPM lock file
#   - "**/generated/**"         # Any file in a 'generated' directory (* must be quoted)
#   - build/*.xml               # XML files in build directory
#
# Lock files are typically generated by package managers and should be
# regenerated after updating the main dependency files.
#
patterns:
  # Go
  - go.sum

  # Swift
  - Package.resolved

  # Scala
  - scala-dependency-tree.txt
  - sbt-dependency-tree.txt

  # NPM/JavaScript
  - package-lock.json
  - npm-shrinkwrap.json
  - yarn.lock

  # Python
  - Pipfile.lock
  - poetry.lock

  # Ruby
  - Gemfile.lock
  - gems.locked

  # PHP
  - composer.lock

  # .NET/NuGet
  - paket.lock
  - packages.lock.json
  - project.lock.json
  - project.assets.json

  # Gradle
  - gradle.lockfile
  - "*-gradle.lockfile"

  # Rust
  - Cargo.lock

  # C/C++ (Conan)
  - conan.lock

  # iOS/macOS (CocoaPods)
  - Podfile.lock

  # PNPM
  - pnpm-lock.yaml

  # General patterns for lock files
  - "*.lock"
  - "*.locked"
  